services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/weights:/app/weights
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs
    environment:
      - FORCE_CPU=0
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              count: 1

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
